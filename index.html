<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Side-by-Side Maps</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="map-row">
    <!-- Map 1 -->
    <div class="map-container" onclick="expandOnlyThisMap(this)" data-map-id="map1">
      <div class="map-label">Neville Arena</div>
      <div class="map-content">
        <img src="map1.jpg" alt="Map 1" class="map-image" />
        <div class="location-wrapper" style="top: 20%; left: 35%;">
          <div class="location-icon RightArrow" onclick="toggleExpand(event, this)">
            <span class="icon-label">1</span>
          </div>
          <div class="info-box">Info for Map 1, Location 1</div>
        </div>
        <div class="location-wrapper" style="top: 60%; left: 50%;">
          <div class="location-icon LeftArrow" onclick="toggleExpand(event, this)">
            <span class="icon-label">2</span>
          </div>
          <div class="info-box">Info for Map 1, Location 2</div>
        </div>
        <button class="close-button" onclick="event.stopPropagation(); collapseMap(this.closest('.map-container'));">✕ Close</button>
      </div>
    </div>

    <!-- Map 2 -->
    <div class="map-container" onclick="expandOnlyThisMap(this)" data-map-id="map2">
      <div class="map-label">JHS Truck Dock</div>
      <div class="map-content">
        <img src="map2.jpg" alt="Map 2" class="map-image" />
        <div class="location-wrapper" style="top: 25%; left: 45%;">
          <div class="location-icon RightArrow" onclick="toggleExpand(event, this)">
            <span class="icon-label">1</span>
          </div>
          <div class="info-box">Info for Map 2, Location 1</div>
        </div>
        <div class="location-wrapper" style="top: 55%; left: 30%;">
          <div class="location-icon LeftArrow" onclick="toggleExpand(event, this)">
            <span class="icon-label">2</span>
          </div>
          <div class="info-box">Info for Map 2, Location 2</div>
        </div>
        <button class="close-button" onclick="event.stopPropagation(); collapseMap(this.closest('.map-container'));">✕ Close</button>
      </div>
    </div>

    <!-- Map 3 -->
    <div class="map-container" onclick="expandOnlyThisMap(this)" data-map-id="map3">
      <div class="map-label">Map 3</div>
      <div class="map-content">
        <img src="map1.jpg" alt="Map 3" class="map-image" />
        <div class="location-wrapper" style="top: 30%; left: 60%;">
          <div class="location-icon RightArrow" onclick="toggleExpand(event, this)">
            <span class="icon-label">1</span>
          </div>
          <div class="info-box">Info for Map 3, Location 1</div>
        </div>
        <button class="close-button" onclick="event.stopPropagation(); collapseMap(this.closest('.map-container'));">✕ Close</button>
      </div>
    </div>

    <!-- Map 4 -->
    <div class="map-container" onclick="expandOnlyThisMap(this)" data-map-id="map4">
      <div class="map-label">Map 4</div>
      <div class="map-content">
        <img src="map2.jpg" alt="Map 4" class="map-image" />
        <div class="location-wrapper" style="top: 40%; left: 50%;">
          <div class="location-icon RightArrow" onclick="toggleExpand(event, this)">
            <span class="icon-label">1</span>
          </div>
          <div class="info-box">Info for Map 4, Location 1</div>
        </div>
        <button class="close-button" onclick="event.stopPropagation(); collapseMap(this.closest('.map-container'));">✕ Close</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
